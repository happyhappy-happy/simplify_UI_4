<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>閩南語 TTS Demo</title>
</head>
<body>
  <h1>閩南語文字轉語音</h1>

  <input id="textInput" type="text" value="Lí-hó"> <!-- 建議用台羅拼音 -->
  <button id="playTTS">播放閩南語語音</button>
  <br><br>
  <audio id="audioPlayer" controls></audio>
  <div id="errorMsg" style="color:red;"></div>

  <script>
    const API_URL = "https://happy0708-minnan-test.hf.space/gradio_api/call/v2/tts";
    const EVENT_URL = "https://happy0708-minnan-test.hf.space/gradio_api/call/v2/tts";

    async function pollEvent(eventId) {
      const url = `${EVENT_URL}/${eventId}`;
      for (let i = 0; i < 20; i++) {
        const response = await fetch(url, { method: "GET" });
        const text = await response.text();
        console.log("poll", i, text);

        try {
          const result = JSON.parse(text);
          if (result?.data?.[0]?.data) {
            return result.data[0].data;
          }
          if (result?.data?.[0]?.path) {
            return result.data[0].path;
          }
        } catch {
          // ignore
        }

        await new Promise((resolve) => setTimeout(resolve, 1000));
      }
      return null;
    }

    document.getElementById("playTTS").addEventListener("click", async () => {
      const text = document.getElementById("textInput").value;
      const errorDiv = document.getElementById("errorMsg");
      errorDiv.textContent = "";

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text })
        });

        console.log("status", response.status);
        const bodyText = await response.text();
        console.log("body", bodyText);

        if (!response.ok) {
          errorDiv.textContent = "語音生成失敗：" + bodyText;
          return;
        }

        let result;
        try {
          result = JSON.parse(bodyText);
        } catch {
          errorDiv.textContent = "語音生成失敗：回傳內容不是 JSON";
          return;
        }

        const eventId = result?.event_id || result?.eventId;
        if (!eventId) {
          errorDiv.textContent = "語音生成失敗：Space 未回傳事件 ID";
          return;
        }

        const audioData = await pollEvent(eventId);
        if (!audioData) {
          errorDiv.textContent = "語音生成失敗：Space 未回傳音訊資料";
          return;
        }

        let audioBytes;
        if (typeof audioData === "string") {
          audioBytes = Uint8Array.from(atob(audioData), (c) => c.charCodeAt(0));
        } else if (audioData instanceof ArrayBuffer) {
          audioBytes = new Uint8Array(audioData);
        } else {
          errorDiv.textContent = "語音生成失敗：音訊格式不支援";
          return;
        }

        const audioBlob = new Blob([audioBytes], { type: "audio/wav" });
        const url = URL.createObjectURL(audioBlob);
        const audio = document.getElementById("audioPlayer");
        audio.src = url;
        await audio.play();
      } catch (e) {
        errorDiv.textContent = "語音生成失敗：" + e.message;
      }
    });
  </script>
</body>
</html>
