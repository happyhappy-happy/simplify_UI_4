<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>閩南語 TTS Demo</title>
</head>
<body>
  <h1>閩南語文字轉語音</h1>

  <input id="textInput" type="text" value="Lí-hó"> <!-- 建議用台羅拼音 -->
  <button id="playTTS">播放閩南語語音</button>
  <br><br>
  <audio id="audioPlayer" controls></audio>
  <div id="errorMsg" style="color:red;"></div>

  <script>
    function speakWithBrowser(text) {
      if (!('speechSynthesis' in window)) {
        document.getElementById('errorMsg').textContent = '瀏覽器不支援語音播放';
        return;
      }

      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'zh-TW';
      utterance.rate = 1;
      utterance.pitch = 1;
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(utterance);
    }

    document.getElementById('playTTS').addEventListener('click', () => {
      const text = document.getElementById('textInput').value;
      const errorDiv = document.getElementById('errorMsg');
      errorDiv.textContent = '';
      speakWithBrowser(text);
    });
  </script>
</body>
</html>
