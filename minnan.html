<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>閩南語 TTS Demo</title>
</head>
<body>
  <h1>閩南語文字轉語音</h1>

  <input id="textInput" type="text" value="Lí-hó"> <!-- 建議用台羅拼音 -->
  <button id="playTTS">播放閩南語語音</button>
  <br><br>
  <audio id="audioPlayer" controls></audio>
  <div id="errorMsg" style="color:red;"></div>

  <script>
    const API_URL = "https://huggingface.co/spaces/happy0708/minnan_test/api/predict/";

    document.getElementById("playTTS").addEventListener("click", async () => {
      const text = document.getElementById("textInput").value;
      const errorDiv = document.getElementById("errorMsg");
      errorDiv.textContent = "";

      try {
        // 呼叫 Hugging Face Space API
        const response = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ data: [text] })
        });

        if (!response.ok) {
          const bodyText = await response.text();
          errorDiv.textContent = "語音生成失敗：" + bodyText;
          return;
        }

        // 解析回傳 JSON
        const result = await response.json();
        const audioData = result.data[0].data; // Base64 音訊字串

        // Base64 → Uint8Array → Blob → URL
        const audioBytes = Uint8Array.from(atob(audioData), c => c.charCodeAt(0));
        const audioBlob = new Blob([audioBytes], { type: "audio/wav" });
        const url = URL.createObjectURL(audioBlob);

        // 播放音訊
        const audio = document.getElementById("audioPlayer");
        audio.src = url;
        await audio.play();
      } catch (e) {
        errorDiv.textContent = "語音生成失敗：" + e.message;
      }
    });
  </script>
</body>
</html>
