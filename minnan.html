<button id="playTTS">播放閩南語語音</button>
<audio id="audioPlayer" controls></audio>
<div id="errorMsg" style="color:red;"></div>

<script>
document.getElementById("playTTS").addEventListener("click", async () => {
  const text = "你好，我是閩南語語音測試";
  const errorDiv = document.getElementById("errorMsg");
  errorDiv.textContent = ""; // 清空錯誤訊息

  try {
    const response = await fetch(`/api/tts?text=${encodeURIComponent(text)}`);
    if (!response.ok) {
      const err = await response.json();
      errorDiv.textContent = "語音生成失敗：" + (err.error || "未知錯誤");
      return;
    }

    const blob = await response.blob();
    const url = URL.createObjectURL(blob);
    const audio = document.getElementById("audioPlayer");
    audio.src = url;
    audio.play();
  } catch (e) {
    errorDiv.textContent = "前端錯誤：" + e.message;
  }
});
</script>
