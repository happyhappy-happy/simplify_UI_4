<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>閩南語 TTS Demo</title>
</head>

<body>

<h2>閩南語 TTS Demo</h2>

<input
    id="textInput"
    type="text"
    value="Lí hó"
/>

<button id="playBtn">
播放
</button>

<br><br>

<audio
    id="audioPlayer"
    controls
></audio>

<p id="msg" style="color:red;"></p>

<script>

const SPACE = "https://happy0708-minnan-test.hf.space";

const API = `${SPACE}/gradio_api/call/v2/tts`;

async function pollEvent(eventId){

    const pollUrl = `${API}/${eventId}`;

    while(true){

        const res = await fetch(pollUrl);

        const text = await res.text();

        console.log(text);

        // 找 data:
        const match = text.match(/data:\s*(.+)/);

        if(match){

            const data = JSON.parse(match[1]);

            if(data.length>0 && data[0].url){

                return data[0].url;

            }

        }

        // 完成前每秒查一次
        await new Promise(r=>setTimeout(r,1000));

    }

}

document.getElementById("playBtn").onclick = async ()=>{

    const msg=document.getElementById("msg");
    msg.textContent="";

    try{

        const text=document.getElementById("textInput").value;

        const res=await fetch(API,{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                text:text
            })
        });

        console.log("status",res.status);

        const body=await res.json();

        console.log(body);

        const eventId=body.event_id;

        if(!eventId){

            throw new Error("沒有 event_id");

        }

        const audioUrl=await pollEvent(eventId);

        console.log(audioUrl);

        const player=document.getElementById("audioPlayer");

        player.src=audioUrl;

        await player.play();

    }
    catch(err){

        console.error(err);

        msg.textContent=err.message;

    }

}

</script>

</body>
</html>
